// ─── Loading progress tracker ────────────────────────────────────────────────
(function() {
  var bar = document.getElementById("splash-bar");
  var txt = document.getElementById("splash-txt");
  var note = document.getElementById("splash-note");
  
  window._splashStep = function(pct, msg) {
    if (bar) bar.style.width = pct + "%";
    if (txt && msg) txt.textContent = msg;
  };
  
  // Smooth progress animation so it never looks frozen
  var pct = 5;
  var interval = setInterval(function() {
    pct = Math.min(pct + 2, 88); // creep up but never reach 100 until ready
    if (bar) bar.style.width = pct + "%";
  }, 400);
  window._splashInterval = interval;
  
  // Step messages
  setTimeout(function(){ if(txt) txt.textContent = "Loading Firebase…"; }, 500);
  setTimeout(function(){ if(txt) txt.textContent = "Compiling app…"; }, 1500);
  setTimeout(function(){ if(txt) txt.textContent = "Almost ready…"; }, 4000);
  
  // Show "please wait" note after 5 seconds
  setTimeout(function(){ 
    if(note) note.style.display = "block";
    if(txt) txt.textContent = "Still loading — please wait…";
  }, 5000);
  
  // Safety net: force complete after 45 seconds
  setTimeout(function(){
    clearInterval(window._splashInterval);
    var el = document.getElementById("splash");
    if(el) el.classList.add("hide");
  }, 45000);
})();
</script>

const FS = {
  // Registrations
  addReg: (reg) => db.collection("registrations").doc(reg.id).set(reg),
  updateReg: (id, patch) => db.collection("registrations").doc(id).update(patch),
  getReg: async (id) => {
    const snap = await db.collection("registrations").doc(id).get();
    return snap.exists ? { id: snap.id, ...snap.data() } : null;
  },
  // Real-time listener for all registrations
  onRegs: (cb) => db.collection("registrations").orderBy("createdAt","desc").onSnapshot(
    snap => cb(snap.docs.map(d => ({ id: d.id, ...d.data() })))
  ),
  // Candidates
  getCandidates: async () => {
    const snap = await db.collection("candidates").orderBy("order").get();
    return snap.docs.map(d => ({ id: d.id, ...d.data() }));
  },
  setCandidates: async (list) => {
    const batch = db.batch();
    // Delete existing
    const existing = await db.collection("candidates").get();
    existing.docs.forEach(d => batch.delete(d.ref));
    // Write new
    list.forEach((c, i) => batch.set(db.collection("candidates").doc(c.id), { ...c, order: i }));
    return batch.commit();
  },
  // Voting — each reg gets one vote doc
  recordVote: (regId, candidateIds) =>
    db.collection("votes").doc(regId).set({ regId, candidateIds, votedAt: new Date().toISOString() }),
  hasVoted: async (regId) => {
    const snap = await db.collection("votes").doc(regId).get();
    return snap.exists;
  },
  onVotes: (cb) => db.collection("votes").onSnapshot(
    snap => cb(snap.docs.map(d => d.data()))
  ),
};

// QR CODE — canvas-based
// ─────────────────────────────────────────────────────────────────────────────
function generateQRMatrix(text) {
  const size=25, matrix=Array(size).fill(null).map(()=>Array(size).fill(0));
  const finder=(r,c)=>{for(let i=0;i<7;i++)for(let j=0;j<7;j++){const on=i===0||i===6||j===0||j===6||(i>=2&&i<=4&&j>=2&&j<=4);if(r+i<size&&c+j<size)matrix[r+i][c+j]=on?1:0;}};
  finder(0,0);finder(0,18);finder(18,0);
  let h=5381;for(let i=0;i<text.length;i++)h=((h<<5)+h)^text.charCodeAt(i);h=Math.abs(h);
  for(let i=0;i<size;i++)for(let j=0;j<size;j++){if(matrix[i][j]===0&&!((i<8&&j<8)||(i<8&&j>=18)||(i>=18&&j<8)))matrix[i][j]=(h>>>((i*7+j*3)%31))&1;}
  for(let i=8;i<17;i++){matrix[6][i]=i%2===0?1:0;matrix[i][6]=i%2===0?1:0;}
  return matrix;
}
function QRCode({value,size=180,dark="#0d1b3e",light="#ffffff"}){
  const ref=useRef();
  useEffect(()=>{const canvas=ref.current;if(!canvas)return;const ctx=canvas.getContext("2d");const mat=generateQRMatrix(value);const cell=size/mat.length;ctx.fillStyle=light;ctx.fillRect(0,0,size,size);ctx.fillStyle=dark;mat.forEach((row,i)=>row.forEach((v,j)=>{if(v)ctx.fillRect(j*cell,i*cell,cell-.5,cell-.5);}));},[value,size,dark,light]);
  return <canvas ref={ref} width={size} height={size} style={{display:"block"}}/>;
}
function qrToDataUrl(value,size=300){
  const canvas=document.createElement("canvas");canvas.width=size;canvas.height=size;
  const ctx=canvas.getContext("2d");const mat=generateQRMatrix(value);const cell=size/mat.length;
  ctx.fillStyle="#fff";ctx.fillRect(0,0,size,size);ctx.fillStyle="#0d1b3e";
  mat.forEach((row,i)=>row.forEach((v,j)=>{if(v)ctx.fillRect(j*cell,i*cell,cell,cell);}));
  return canvas.toDataURL("image/png");
}

// ─────────────────────────────────────────────────────────────────────────────
// RECEIPT LIGHTBOX
// ─────────────────────────────────────────────────────────────────────────────
function ReceiptLightbox({ src, name, onClose }) {
  useEffect(() => {
    const h = e => { if(e.key==="Escape") onClose(); };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, [onClose]);
  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,zIndex:1000,background:"rgba(0,0,0,.88)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"1rem"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:16,overflow:"hidden",maxWidth:480,width:"100%",boxShadow:"0 24px 60px rgba(0,0,0,.6)"}}>
        <div style={{background:"var(--navy)",padding:"1rem 1.25rem",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{color:"var(--gold)",fontFamily:"Cormorant Garamond,serif",fontSize:"1.05rem",fontWeight:700}}>GCash Receipt</div>
            <div style={{color:"rgba(255,255,255,.6)",fontSize:".75rem",marginTop:2}}>{name}</div>
          </div>
          <button onClick={onClose} style={{background:"rgba(255,255,255,.15)",border:"none",color:"#fff",width:36,height:36,borderRadius:"50%",cursor:"pointer",fontSize:"1rem",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
        </div>
        <div style={{background:"#f5f0e8",padding:"1rem",textAlign:"center"}}>
          <img src={src} alt="GCash receipt" style={{maxWidth:"100%",maxHeight:"65vh",objectFit:"contain",borderRadius:8,boxShadow:"0 4px 16px rgba(0,0,0,.15)"}}/>
        </div>
        <div style={{padding:".9rem 1.25rem",borderTop:"1px solid var(--border)",display:"flex",justifyContent:"flex-end",gap:".6rem",background:"#fdfcf9"}}>
          <button className="btn btn-ghost" onClick={onClose}>Close</button>
          <a href={src} download={`receipt-${name}.png`} className="btn btn-navy" style={{fontSize:".85rem",padding:"9px 16px"}}>⬇ Download</a>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// REGISTRATION PAGE
// ─────────────────────────────────────────────────────────────────────────────
function RegistrationPage() {
  const [step,setStep]=useState(1);
  const [form,setForm]=useState({firstName:"",lastName:"",batch:"",email:"",phone:""});
  const [errs,setErrs]=useState({});
  const [receipt,setReceipt]=useState(null);
  const [preview,setPreview]=useState(null);
  const [busy,setBusy]=useState(false);
  const [done,setDone]=useState(null);
  const [emailStatus,setEmailStatus]=useState(null);
  const fileRef=useRef();

  const set=(k,v)=>setForm(p=>({...p,[k]:v}));
  const validate=()=>{
    const e={};
    if(!form.firstName.trim())e.firstName=true;
    if(!form.lastName.trim())e.lastName=true;
    const yr=parseInt(form.batch);
    if(!form.batch||isNaN(yr)||yr<1950||yr>2030)e.batch=true;
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email))e.email=true;
    if(form.phone.replace(/\D/g,"").length<10)e.phone=true;
    setErrs(e); return Object.keys(e).length===0;
  };
  const handleFile=f=>{
    if(!f)return; setReceipt(f);
    const r=new FileReader(); r.onload=ev=>setPreview(ev.target.result); r.readAsDataURL(f);
  };
  const submit=async()=>{
    if(!receipt){alert("Please upload your GCash receipt screenshot.");return;}
    setBusy(true);
    const reg={id:genId(),...form,status:"pending",checkedIn:false,voted:false,createdAt:new Date().toISOString(),receiptImg:preview||null};
    await FS.addReg(reg);
    setDone(reg); setStep(3); setBusy(false);
    setEmailStatus("sending");
    const qrUrl=qrToDataUrl(reg.id);
    const res=await sendConfirmationEmail(reg,qrUrl);
    setEmailStatus(res.simulated?"sim":res.ok?"ok":"err");
  };
  const reset=()=>{setStep(1);setForm({firstName:"",lastName:"",batch:"",email:"",phone:""});setErrs({});setReceipt(null);setPreview(null);setDone(null);setEmailStatus(null);};

  if(step===3&&done) return (
    <div className="body">
      <div className="card">
        <div className="success-wrap">
          <div className="success-icon">🎓</div>
          <h2>You're Registered!</h2>
          <p style={{color:"var(--muted)",fontSize:".85rem",margin:".35rem 0 .6rem"}}>Pending payment confirmation. You'll receive an email once verified.</p>
          <div className="reg-chip">{done.id}</div>
          <div className="qr-frame"><QRCode value={done.id} size={190}/></div>
          <p style={{fontSize:".75rem",color:"var(--muted)",margin:".2rem 0 .65rem"}}>📸 Screenshot this QR code — present it at the entrance on event day.</p>
          {emailStatus==="sending"&&<div className="email-chip chip-wait">📧 Sending confirmation email…</div>}
          {emailStatus==="ok"&&<div className="email-chip chip-ok">✅ Confirmation sent to {done.email}</div>}
          {emailStatus==="sim"&&<div className="email-chip chip-sim">⚠️ EmailJS not configured yet</div>}
          {emailStatus==="err"&&<div className="email-chip chip-err">❌ Email failed — contact organizer</div>}
          <div className="alert a-info" style={{marginTop:"1.1rem",textAlign:"left"}}>ℹ️ <strong>Next:</strong> Our team will verify your GCash payment before the event.</div>
          <button className="btn btn-navy btn-full" onClick={reset} style={{marginTop:".4rem"}}>Register Another Guest</button>
        </div>
      </div>
    </div>
  );

  return (
    <div className="body">
      <div className="steps">
        {[["Details",1],["Payment",2],["Done",3]].map(([label,n],i,arr)=>(
          <span key={n} style={{display:"contents"}}>
            <div className={`step ${step===n?"on":step>n?"done":""}`}>
              <div className="step-n">{step>n?"✓":n}</div>
              <div className="step-l">{label}</div>
            </div>
            {i<arr.length-1&&<div className={`step-bar ${step>n?"done":""}`}/>}
          </span>
        ))}
      </div>
      {step===1&&(
        <div className="card">
          <div className="card-head">Your Information</div>
          <div className="row2">
            <div className="fg"><label>First Name</label><input className={errs.firstName?"err":""} value={form.firstName} onChange={e=>set("firstName",e.target.value)} placeholder="Maria"/></div>
            <div className="fg"><label>Last Name</label><input className={errs.lastName?"err":""} value={form.lastName} onChange={e=>set("lastName",e.target.value)} placeholder="Santos"/></div>
          </div>
          <div className="fg"><label>Batch Year</label><input type="number" className={errs.batch?"err":""} value={form.batch} onChange={e=>set("batch",e.target.value)} placeholder="e.g. 1998" min="1950" max="2030"/></div>
          <div className="fg">
            <label>Email Address</label>
            <input type="email" className={errs.email?"err":""} value={form.email} onChange={e=>set("email",e.target.value)} placeholder="maria@email.com"/>
            <div className="hint">Your QR code confirmation will be emailed here.</div>
          </div>
          <div className="fg"><label>Mobile Number</label><input className={errs.phone?"err":""} value={form.phone} onChange={e=>set("phone",e.target.value)} placeholder="09XX-XXX-XXXX"/></div>
          {Object.keys(errs).length>0&&<div className="alert a-err">Please fill in all fields correctly.</div>}
          <button className="btn btn-navy btn-full" onClick={()=>validate()&&setStep(2)}>Continue to Payment →</button>
        </div>
      )}
      {step===2&&(
        <div className="card">
          <div className="card-head">GCash Payment</div>
          <div className="gcash-card">
            <div className="gcash-logo">G<span>Cash</span></div>
            <div className="gcash-qr-wrap">
              <img src="gcash-qr.jpg" alt="GCash QR" style={{width:"100%",height:"100%",objectFit:"contain"}}/>
            </div>
            <div style={{fontSize:".75rem",opacity:.75}}>Or send to number:</div>
            <div className="gcash-num">{CONFIG.gcashNumber}</div>
            <div className="gcash-name">{CONFIG.gcashName}</div>
            <div style={{fontSize:".75rem",opacity:.7,marginTop:".4rem"}}>Registration Fee</div>
            <div className="gcash-amount">₱{CONFIG.regFee.toLocaleString()}.00</div>
            <div className="gcash-tip">💬 Put your full name as the GCash message/note</div>
          </div>
          <p style={{fontSize:".83rem",color:"var(--muted)",marginBottom:".9rem"}}>After sending, screenshot your receipt and upload it below.</p>
          <div className={`upload-zone ${preview?"has":""}`} onClick={()=>fileRef.current.click()} onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();handleFile(e.dataTransfer.files[0]);}}>
            <div className="uicon">{preview?"🖼️":"📎"}</div>
            {preview?<><p><strong>Receipt uploaded</strong> — tap to change</p><img src={preview} alt="receipt" className="upload-thumb"/></>:<p>Tap to upload your <strong>GCash receipt screenshot</strong></p>}
            <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>handleFile(e.target.files[0])}/>
          </div>
          <div style={{display:"flex",gap:".65rem",marginTop:"1.1rem"}}>
            <button className="btn btn-ghost" onClick={()=>setStep(1)}>← Back</button>
            <button className="btn btn-navy" style={{flex:1}} onClick={submit} disabled={busy}>{busy?"Saving…":"Submit Registration ✓"}</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// ADMIN PAGE — real-time via Firestore onSnapshot
// ─────────────────────────────────────────────────────────────────────────────
function AdminPage() {
  const [pin,setPin]=useState("");
  const [unlocked,setUnlocked]=useState(false);
  const [pinErr,setPinErr]=useState(false);
  const [tab,setTab]=useState("regs");
  const [regs,setRegs]=useState([]);
  const [votes,setVotes]=useState([]);
  const [search,setSearch]=useState("");
  const [filter,setFilter]=useState("all");
  const [candidates,setCandidates]=useState([]);
  const [nc,setNc]=useState({name:"",batch:"",position:""});
  const [lightbox,setLightbox]=useState(null);
  const [loading,setLoading]=useState(true);

  // Real-time listeners — auto-update when ANY iPad changes data
  useEffect(()=>{
    if(!unlocked) return;
    setLoading(true);
    const unsubRegs = FS.onRegs(data=>{setRegs(data);setLoading(false);});
    const unsubVotes = FS.onVotes(data=>setVotes(data));
    FS.getCandidates().then(c=>setCandidates(c.length?c:SEED_CANDIDATES));
    return ()=>{unsubRegs();unsubVotes();};
  },[unlocked]);

  const tryUnlock=()=>{
    if(pin===CONFIG.adminPin){setUnlocked(true);setPinErr(false);}
    else{setPinErr(true);setPin("");}
  };

  if(!unlocked) return(
    <div className="pin-wrap">
      <div style={{fontSize:"2.2rem",marginBottom:".4rem"}}>🔐</div>
      <h2>Admin Access</h2>
      <p>Enter the admin PIN to continue.</p>
      <input className="pin-input" type="password" inputMode="numeric" value={pin} onChange={e=>{setPin(e.target.value);setPinErr(false);}} onKeyDown={e=>e.key==="Enter"&&tryUnlock()} placeholder="• • • •" maxLength={6}/>
      {pinErr&&<div className="alert a-err" style={{marginTop:".65rem"}}>Incorrect PIN.</div>}
      <button className="btn btn-navy" style={{marginTop:".9rem",width:"100%"}} onClick={tryUnlock}>Unlock</button>
    </div>
  );

  const approve=id=>FS.updateReg(id,{status:"paid",approvedAt:new Date().toISOString()});
  const reject=id=>FS.updateReg(id,{status:"rejected"});

  const filtered=regs.filter(r=>{
    const q=search.toLowerCase();
    const m=`${r.firstName} ${r.lastName} ${r.email} ${r.id} ${r.batch}`.toLowerCase().includes(q);
    return m&&(filter==="all"||r.status===filter);
  });

  const total=regs.length, paid=regs.filter(r=>r.status==="paid").length;
  const pending=regs.filter(r=>r.status==="pending").length;
  const checkedIn=regs.filter(r=>r.checkedIn).length;
  const voted=regs.filter(r=>r.voted).length;

  const vc={};candidates.forEach(c=>{vc[c.id]=0;});
  votes.forEach(v=>v.candidateIds?.forEach(cId=>{if(vc[cId]!==undefined)vc[cId]++;}));
  const maxV=Math.max(...Object.values(vc),1);

  const addCand=async()=>{
    if(!nc.name||!nc.batch||!nc.position)return;
    const updated=[...candidates,{...nc,id:"c"+Date.now()}];
    await FS.setCandidates(updated); setCandidates(updated); setNc({name:"",batch:"",position:""});
  };
  const delCand=async id=>{
    const updated=candidates.filter(c=>c.id!==id);
    await FS.setCandidates(updated); setCandidates(updated);
  };

  return(
    <div className="body wide">
      {/* Live sync indicator */}
      <div style={{textAlign:"right",marginBottom:".5rem",fontSize:".72rem",color:"var(--muted)"}}>
        <span className="sync-dot"/>Live sync — all iPads see the same data
      </div>
      <div className="stats">
        <div className="stat"><div className="stat-n">{total}</div><div className="stat-l">Registered</div></div>
        <div className="stat"><div className="stat-n" style={{color:"var(--green)"}}>{paid}</div><div className="stat-l">Confirmed</div></div>
        <div className="stat"><div className="stat-n" style={{color:"#92400e"}}>{pending}</div><div className="stat-l">Pending</div></div>
        <div className="stat"><div className="stat-n">{checkedIn}</div><div className="stat-l">Checked In</div></div>
        <div className="stat"><div className="stat-n" style={{color:"#5b21b6"}}>{voted}</div><div className="stat-l">Voted</div></div>
        <div className="stat"><div className="stat-n">{regs.filter(r=>r.status==="rejected").length}</div><div className="stat-l">Rejected</div></div>
      </div>
      <div className="itabs">
        <button className={`itab ${tab==="regs"?"on":""}`} onClick={()=>setTab("regs")}>📋 Registrations</button>
        <button className={`itab ${tab==="cands"?"on":""}`} onClick={()=>setTab("cands")}>🗳️ Candidates</button>
        <button className={`itab ${tab==="results"?"on":""}`} onClick={()=>setTab("results")}>📊 Results</button>
      </div>

      {tab==="regs"&&(

function useJsQR() {
  const [ready,setReady]=useState(!!window.jsQR);
  useEffect(()=>{if(window.jsQR){setReady(true);return;}const s=document.createElement("script");s.src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js";s.onload=()=>setReady(true);document.head.appendChild(s);},[]);
  return ready;
}

// SCAN INPUT — Bluetooth scanner auto-submit

function ScanInput({ placeholder, onScan }) {
const [val,setVal]=useState(””);
const lastKeyTime=useRef(0), timerRef=useRef(null);
const trySubmit=useCallback((v)=>{const id=v.trim().toUpperCase();if(id.length>=6){setVal(””);onScan(id);}},[onScan]);
const handleChange=e=>{
const nv=e.target.value.toUpperCase(); setVal(nv);
const now=Date.now(), gap=now-lastKeyTime.current; lastKeyTime.current=now;
if(gap<80){clearTimeout(timerRef.current);timerRef.current=setTimeout(()=>trySubmit(nv),200);}
};
const handleKey=e=>{if(e.key===“Enter”||e.keyCode===13){e.preventDefault();clearTimeout(timerRef.current);trySubmit(val);}};
useEffect(()=>()=>clearTimeout(timerRef.current),[]);
return <input className="scan-input" value={val} onChange={handleChange} onKeyDown={handleKey} onKeyUp={handleKey} placeholder={placeholder} autoComplete="off" autoCorrect="off" autoCapitalize="characters" spellCheck={false} inputMode="text"/>;
}

              {r.voted&&<span className="badge b-vote">Voted</span>}
              <span className="badge b-in">✓</span>
            </div>
          </div>
        ))}
      </div>
    </>
  )}

  {tab==="vote"&&voteState==="scan"&&(
    <>
      <div className="scan-hero">
        <h2>Board Election</h2>
        <p>Scan the guest's QR code to open their ballot</p>
        <button className="btn btn-gold" style={{width:"100%",padding:"15px",fontSize:"1rem",marginBottom:".85rem"}} onClick={()=>setShowVoteCam(true)}>📷 Scan QR with Camera</button>
        <ScanInput placeholder="Or type / paste Registration ID" onScan={processVoteScan}/>
      </div>
      {voteErr&&<div className="alert a-err">{voteErr}</div>}
      <div className="alert a-info">ℹ️ Guest must be checked in first. Each guest votes only once.</div>
    </>
  )}

  {tab==="vote"&&voteState==="select"&&voter&&(
    <div className="card">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"1rem",flexWrap:"wrap",gap:".5rem"}}>
        <div>
          <div className="card-head" style={{marginBottom:0}}>Cast Your Vote</div>
          <div style={{color:"var(--muted)",fontSize:".78rem",marginTop:3}}>{voter.firstName} {voter.lastName} · Batch {voter.batch}</div>
        </div>
        <button className="btn btn-ghost" onClick={()=>{setVoter(null);setVoteState("scan");}}>Cancel</button>
      </div>
      <p style={{fontSize:".8rem",color:"var(--muted)",marginBottom:"1rem"}}>Select your preferred candidates. You may choose more than one.</p>
      <div className="cands">
        {candidates.map(c=>(
          <div key={c.id} className={`cand ${selected.includes(c.id)?"sel":""}`} onClick={()=>setSelected(p=>p.includes(c.id)?p.filter(x=>x!==c.id):[...p,c.id])}>
            <div className="cand-av">{c.name.split(" ").map(n=>n[0]).join("").slice(0,2)}</div>
            <div className="cand-name">{c.name}</div>
            <div className="cand-pos">{c.position}</div>
            <div style={{fontSize:".68rem",color:"var(--muted)"}}>Batch {c.batch}</div>
            <div className="cand-chk">{selected.includes(c.id)?"✅":"⬜"}</div>
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:".6rem",marginTop:"1.1rem"}}>
        <button className="btn btn-ghost" onClick={()=>{setVoter(null);setVoteState("scan");}}>← Back</button>
        <button className="btn btn-navy" style={{flex:1}} onClick={submitVote} disabled={!selected.length}>Submit Vote {selected.length>0?`(${selected.length})`:""}</button>
      </div>
    </div>
  )}

  {tab==="vote"&&voteState==="done"&&voter&&(
    <div className="card">
      <div className="vote-ok">
        <div className="vi">🗳️</div>
        <h2>Vote Recorded!</h2>
        <p>Thank you, <strong>{voter.firstName}</strong>! Your vote has been saved.</p>
        <button className="btn btn-navy btn-full" onClick={()=>{setVoter(null);setVoteState("scan");setVoteErr("");setSelected([]);}}>Next Voter →</button>
      </div>
    </div>
  )}

  {tab==="log"&&(
    <div className="card">
      <div className="card-head">Attendance Log</div>
      <div style={{display:"flex",gap:".4rem",marginBottom:"1rem",flexWrap:"wrap"}}>
        <span className="badge b-in">{checkedInList.length} arrived</span>
        <span className="badge b-vote">{checkedInList.filter(r=>r.voted).length} voted</span>
        <span className="badge b-pend">{checkedInList.filter(r=>!r.voted).length} not voted</span>
      </div>
      <div className="log-list">
        {checkedInList.length===0&&<p style={{color:"var(--muted)",textAlign:"center",padding:"1.5rem 0"}}>No attendees yet.</p>}
        {[...checkedInList].sort((a,b)=>b.checkedInAt?.localeCompare(a.checkedInAt||"")).map(r=>(
          <div className="log-item" key={r.id}>
            <div style={{flex:1,minWidth:0}}>
              <div className="log-nm">{r.firstName} {r.lastName}</div>
              <div className="log-dt">Batch {r.batch} · {r.checkedInAt?new Date(r.checkedInAt).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):"—"}</div>
            </div>
            {r.voted?<span className="badge b-vote">Voted</span>:<span className="badge b-pend">Pending</span>}
          </div>
        ))}
      </div>
    </div>
  )}
</div>
```

);

function App() {
const [page,setPage]=useState(“register”);
const [dbOk] = useState(!!window._dbReady);
// Hide splash once app renders
useEffect(()=>{
if(window._splashInterval) clearInterval(window._splashInterval);
var bar=document.getElementById(‘splash-bar’);
if(bar) bar.style.width=‘100%’;
setTimeout(()=>{
const el=document.getElementById(‘splash’);
if(el) el.classList.add(‘hide’);
}, 400);
}, []);
// If Firebase failed (sandbox), show deploy instructions instead
if (!dbOk) return (
<>
<style>{STYLES}</style>
<div className="app">
<nav className="topbar">
<div className="topbar-brand">✦ {CONFIG.school}<small>{CONFIG.eventName}</small></div>
</nav>
<DeployWarning/>
</div>
</>
);
return(
<>
<style>{STYLES}</style>
<div className="app">
<nav className="topbar">
<div className="topbar-brand">✦ {CONFIG.school}<small>{CONFIG.eventName}</small></div>
<div className="topbar-nav">
{[[“register”,“Register”],[“event”,“Event Day”],[“admin”,“Admin”]].map(([id,label])=>(
<button key={id} className={`tnav ${page===id?"on":""}`} onClick={()=>setPage(id)}>{label}</button>
))}
</div>
</nav>
{page===“register”&&<div className="hero"><div className="hero-badge">Alumni Homecoming 2027</div><h1>Welcome Back,<br/><em>Scholasticans!</em></h1><div className="hero-rule"/><p className="hero-sub">{CONFIG.eventDate} · {CONFIG.eventVenue}</p></div>}

{page===“admin”&&<div className=“hero” style={{padding:“1.75rem 1.25rem”}}><div className="hero-badge">Admin Dashboard</div><h1 style={{fontSize:“1.7rem”}}><em>Registration</em> Manager</h1></div>}
{page===“register”&&<RegistrationPage/>}
{page===“event”&&<EventDayPage/>}
{page===“admin”&&<AdminPage/>}
</div>
</>
);
}

ReactDOM.createRoot(document.getElementById(‘root’)).render(React.createElement(App));
